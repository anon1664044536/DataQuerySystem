<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACAI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="chat-app">

    <!-- 左侧边栏 -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-brand">ACAI</span>
            <button id="newChatBtn" class="new-chat-btn" type="button" title="新对话">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新对话
            </button>
        </div>
        <div class="sidebar-section-title">历史对话</div>
        <ul id="historyList" class="history-list"></ul>
    </aside>

    <!-- 右侧主聊天区 -->
    <main class="chat-main">
        <header class="topbar">
            <button id="toggleBtn" class="icon-btn" type="button" title="收起/展开侧栏" aria-label="收起或展开侧栏">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
            </button>
            <h1 class="topbar-title">数据查询助手</h1>
        </header>

        <section id="chatFeed" class="chat-feed" aria-live="polite">
            <article class="bubble assistant">
                <p class="bubble-role">ACAI</p>
                <p>你好，请输入你的数据问题。</p>
            </article>
        </section>

        <footer class="composer-wrap">
            <label for="question" class="sr-only">输入问题</label>
            <div class="composer-inner">
                <textarea id="question" rows="2" placeholder="输入你的问题，回车发送，Shift+Enter 换行"></textarea>
                <div class="composer-row">
                    <p id="status" class="status">等待输入</p>
                    <button id="submitBtn" class="send-btn" type="button">发送</button>
                </div>
            </div>
        </footer>
    </main>
</div>
<script src="app.js"></script>
</body>
</html>
